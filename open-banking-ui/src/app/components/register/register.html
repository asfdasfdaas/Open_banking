<div class="min-h-[80vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 animate-fade-in">

  <div class="max-w-md w-full bg-white rounded-3xl shadow-xl border border-slate-100 p-8 relative overflow-hidden hover:shadow-2xl transition-shadow duration-300">

    <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-green-400 to-emerald-600"></div>

    <div class="text-center mb-8 mt-2">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-green-50 text-green-600 mb-4 shadow-inner text-3xl">
        ✨
      </div>
      <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Create Account</h2>
      <p class="text-slate-500 mt-2 text-sm">Join our secure Open Banking platform</p>
    </div>

    @if (errorMessage) {
    <div class="mb-6 bg-red-50 border-l-4 border-red-500 p-4 rounded-r-lg animate-fade-in-down">
      <div class="flex">
        <div class="flex-shrink-0">
          <svg class="h-5 w-5 text-red-500" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" /></svg>
        </div>
        <div class="ml-3">
          <p class="text-sm text-red-700 font-medium">{{ errorMessage }}</p>
        </div>
      </div>
    </div>
    }

    <form (ngSubmit)="onRegister()" class="space-y-4">

      <div>
        <label for="username" class="block text-sm font-semibold text-slate-700 mb-1.5">Username</label>
        <div class="relative">
          <input type="text"
                 id="username"
                 name="username"
                 [(ngModel)]="userData.username"
                 required
                 class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all text-slate-800 bg-slate-50 hover:bg-white font-medium placeholder:font-normal placeholder:text-slate-400"
                 placeholder="Choose a username">
        </div>
      </div>

      <div>
        <label for="email" class="block text-sm font-semibold text-slate-700 mb-1.5">Email Address</label>
        <div class="relative">
          <input type="email"
                 id="email"
                 name="email"
                 [(ngModel)]="userData.email"
                 required
                 class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all text-slate-800 bg-slate-50 hover:bg-white font-medium placeholder:font-normal placeholder:text-slate-400"
                 placeholder="you@example.com">
        </div>
      </div>

      <div>
        <label for="password" class="block text-sm font-semibold text-slate-700 mb-1.5">Password</label>
        <div class="relative">
          <input type="password"
                 id="password"
                 name="password"
                 [(ngModel)]="userData.password"
                 required
                 class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all text-slate-800 bg-slate-50 hover:bg-white font-medium placeholder:font-normal placeholder:text-slate-400"
                 placeholder="Create a strong password">
        </div>
      </div>

      <div class="pt-4 space-y-3">
        <button type="submit"
                class="w-full flex justify-center py-3.5 px-4 rounded-xl shadow-md shadow-green-200 text-lg font-bold text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-600 transition-all hover:-translate-y-0.5">
          Sign Up
        </button>

        <button type="button"
                (click)="cancel()"
                class="w-full flex justify-center py-3.5 px-4 rounded-xl text-lg font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 focus:outline-none transition-all">
          Cancel
        </button>
      </div>

    </form>

    <div class="mt-8 text-center text-sm text-slate-600">
      Already have an account?
      <a href="/login" class="font-bold text-green-600 hover:text-green-500 transition-colors">
        Sign in here
      </a>
    </div>
  </div>
</div>
