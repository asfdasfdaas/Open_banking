<div class="register-container" style="max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px;">
  <h2>Create Account</h2>

  @if (errorMessage) {
  <p style="color: red; font-weight: bold;">{{ errorMessage }}</p>
  }

  <div style="margin-bottom: 10px;">
    <label>Username: </label>
    <input type="text" [(ngModel)]="userData.username" placeholder="Choose a username" style="width: 100%; padding: 8px;" />
  </div>

  <div style="margin-bottom: 10px;">
    <label>Email: </label>
    <input type="email" [(ngModel)]="userData.email" placeholder="Enter your email" style="width: 100%; padding: 8px;" />
  </div>

  <div style="margin-bottom: 20px;">
    <label>Password: </label>
    <input type="password" [(ngModel)]="userData.password" placeholder="Create a password" style="width: 100%; padding: 8px;" />
  </div>

  <div style="display: flex; justify-content: space-between;">
    <button (click)="onRegister()" style="padding: 10px 15px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer;">Register</button>
    <button (click)="cancel()" style="padding: 10px 15px; background: #ccc; border: none; border-radius: 4px; cursor: pointer;">Cancel</button>
  </div>
</div>
