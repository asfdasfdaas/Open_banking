<div class="min-h-[80vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 animate-fade-in">

  <div class="max-w-md w-full bg-white rounded-3xl shadow-xl border border-slate-100 p-8 relative overflow-hidden hover:shadow-2xl transition-shadow duration-300">

    <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-500 to-indigo-600"></div>

    <div class="text-center mb-8 mt-2">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-50 text-blue-600 mb-4 shadow-inner text-3xl">
        🔐
      </div>
      <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Welcome Back</h2>
      <p class="text-slate-500 mt-2 text-sm">Sign in to your Open Banking portal</p>
    </div>

    @if (errorMessage) {
    <div class="mb-6 bg-red-50 border-l-4 border-red-500 p-4 rounded-r-lg animate-fade-in-down">
      <div class="flex">
        <div class="flex-shrink-0">
          <svg class="h-5 w-5 text-red-500" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" /></svg>
        </div>
        <div class="ml-3">
          <p class="text-sm text-red-700 font-medium">{{ errorMessage }}</p>
        </div>
      </div>
    </div>
    }

    <form (ngSubmit)="onLogin()" class="space-y-5">

      <div>
        <label for="username" class="block text-sm font-semibold text-slate-700 mb-1.5">Username</label>
        <div class="relative">
          <input type="text"
                 id="username"
                 name="username"
                 [(ngModel)]="credentials.username"
                 required
                 class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-slate-800 bg-slate-50 hover:bg-white font-medium placeholder:font-normal placeholder:text-slate-400"
                 placeholder="Enter your username">
        </div>
      </div>

      <div>
        <label for="password" class="block text-sm font-semibold text-slate-700 mb-1.5">Password</label>
        <div class="relative">
          <input type="password"
                 id="password"
                 name="password"
                 [(ngModel)]="credentials.password"
                 required
                 class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-slate-800 bg-slate-50 hover:bg-white font-medium placeholder:font-normal placeholder:text-slate-400"
                 placeholder="••••••••">
        </div>
      </div>

      <div class="flex items-center justify-between pt-2">
        <div class="flex items-center gap-2">
          <input id="remember-me" name="remember-me" type="checkbox" class="w-4 h-4 text-blue-600 bg-slate-100 border-slate-300 rounded focus:ring-blue-500 cursor-pointer">
          <label for="remember-me" class="text-sm text-slate-600 cursor-pointer font-medium">Remember me</label>
        </div>
        <a href="#" class="text-sm font-semibold text-blue-600 hover:text-blue-500 transition-colors">Forgot password?</a>
      </div>

      <button type="submit"
              class="w-full flex justify-center py-3.5 px-4 rounded-xl shadow-md shadow-slate-200 text-lg font-bold text-white bg-slate-900 hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-900 transition-all hover:-translate-y-0.5 mt-4">
        Sign In
      </button>

    </form>

    <div class="mt-8 text-center text-sm text-slate-600">
      Don't have an account?
      <a href="/register" class="font-bold text-blue-600 hover:text-blue-500 transition-colors">
        Register here
      </a>
    </div>

  </div>
</div>
