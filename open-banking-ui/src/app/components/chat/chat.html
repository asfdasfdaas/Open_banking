<div class="fixed bottom-6 right-6 z-50 flex flex-col items-end">

  @if (isOpen) {
  <div class="bg-white/95 backdrop-blur-xl border border-slate-200 rounded-2xl shadow-2xl w-80 sm:w-96 flex flex-col overflow-hidden mb-4 animate-fade-in-up transition-all">

    <div class="bg-slate-900 text-white px-5 py-4 flex justify-between items-center shadow-md">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center text-sm">✨</div>
        <div>
          <h3 class="font-bold text-sm tracking-wide">AI Assistant</h3>
          <p class="text-xs text-blue-300">Online</p>
        </div>
      </div>
      <button (click)="toggleChat()" class="text-slate-400 hover:text-white transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
      </button>
    </div>

    <div #chatScroll class="flex-1 p-4 overflow-y-auto max-h-96 min-h-[300px] bg-slate-50 space-y-4">
      @for (msg of messages; track $index) {

      @if (msg.sender === 'ai') {
      <div class="flex items-start gap-2 max-w-[85%]">
        <div class="w-6 h-6 rounded-full bg-blue-100 flex-shrink-0 flex items-center justify-center text-xs">✨</div>
        <div class="bg-white border border-slate-200 text-slate-700 text-sm px-4 py-2 rounded-2xl rounded-tl-sm shadow-sm leading-relaxed">
          {{ msg.text }}
        </div>
      </div>
      }

      @if (msg.sender === 'user') {
      <div class="flex items-end justify-end w-full">
        <div class="bg-blue-600 text-white text-sm px-4 py-2 rounded-2xl rounded-tr-sm shadow-sm max-w-[85%] leading-relaxed">
          {{ msg.text }}
        </div>
      </div>
      }

      }

      @if (isLoading) {
      <div class="flex items-start gap-2 max-w-[85%] animate-pulse">
        <div class="w-6 h-6 rounded-full bg-slate-200 flex-shrink-0"></div>
        <div class="bg-slate-200 text-transparent text-sm px-4 py-2 rounded-2xl rounded-tl-sm w-24">...</div>
      </div>
      }
    </div>

    <div class="p-3 bg-white border-t border-slate-100 flex gap-2">
      <input type="text"
             [(ngModel)]="userInput"
             (keyup.enter)="sendMessage()"
             [disabled]="isLoading"
             placeholder="Ask me anything..."
             class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500 transition-all disabled:opacity-50" />
      <button (click)="sendMessage()"
              [disabled]="isLoading || !userInput.trim()"
              class="bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 text-white rounded-xl px-4 py-2 flex items-center justify-center transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transform rotate-90" viewBox="0 0 20 20" fill="currentColor"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" /></svg>
      </button>
    </div>

  </div>
  }

  @if (!isOpen) {
  <button (click)="toggleChat()"
          class="w-14 h-14 bg-slate-900 hover:bg-blue-600 text-white rounded-full shadow-xl hover:shadow-blue-500/30 flex items-center justify-center transition-all duration-300 hover:-translate-y-1 group">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" /></svg>
  </button>
  }
</div>
