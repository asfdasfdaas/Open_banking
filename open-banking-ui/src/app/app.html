<div class="flex flex-col min-h-screen bg-slate-50">

  <nav class="bg-slate-900 text-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">

        <div class="flex items-center gap-2 text-xl font-bold tracking-wide cursor-pointer hover:text-blue-400 transition-colors duration-200"
             (click)="navigate('/')">
          <span class="text-2xl">🏦</span> Open Banking
        </div>

        <div class="flex items-center gap-6 text-sm font-medium">
          <a (click)="navigate('/')" class="cursor-pointer hover:text-blue-400 transition-colors">Home</a>

          @if (isLoggedIn) {
          <a (click)="navigate('/dashboard')" class="cursor-pointer text-blue-400 hover:text-blue-300 transition-colors">Dashboard</a>
          <a (click)="logout()" class="cursor-pointer text-red-400 hover:text-red-300 transition-colors bg-red-400/10 px-3 py-1.5 rounded-md">Logout</a>
          }
          @else {
          <a (click)="navigate('/login')" class="cursor-pointer hover:text-gray-300 transition-colors">Login</a>
          <a (click)="navigate('/register')" class="cursor-pointer bg-green-600 hover:bg-green-500 text-white px-4 py-2 rounded-md transition-colors shadow-sm">Register</a>
          }
        </div>

      </div>
    </div>
  </nav>

  <main class="bg-[#fcba00] flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
    <router-outlet></router-outlet>
  </main>

  <footer class="bg-slate-900 text-slate-400 py-10 border-t border-slate-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-6">

      <div class="text-center md:text-left">
        <div class="flex items-center justify-center md:justify-start gap-2 text-white font-bold text-lg mb-2">
          <span>🏦</span> Open Banking Portal
        </div>
        <p class="text-sm">© Faruk Türkmen. All rights reserved.</p>
      </div>

      <div class="flex gap-8 text-sm font-medium">
        <a href="#" class="hover:text-white transition-colors">Privacy Policy</a>
        <a href="#" class="hover:text-white transition-colors">Terms of Service</a>
        <a href="#" class="hover:text-white transition-colors">API Documentation</a>
      </div>

      <div class="flex gap-3 text-xs opacity-75">
        <span class="bg-slate-800 px-3 py-1.5 rounded-md border border-slate-700">Angular</span>
        <span class="bg-slate-800 px-3 py-1.5 rounded-md border border-slate-700">.NET Core</span>
        <span class="bg-slate-800 px-3 py-1.5 rounded-md border border-slate-700">Tailwind</span>
      </div>

    </div>
  </footer>

</div>
